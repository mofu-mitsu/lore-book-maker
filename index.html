<body>

        <div class="hamburger" id="nav-hamburger"><i class="fa-solid fa-bars"></i></div>
        <div class="nav-links" id="nav-links">
            <a href="https://mofu-mitsu.github.io/"><i class="fa-solid fa-house"></i> もふみつ工房 ホーム</a>

            <a href="https://mofu-mitsu.github.io/orikyara-relationship-chart/"><i class="fa-solid fa-diagram-project"></i> 相関図メーカー</a>
            <a href="#" id="help-link" class="help-link-style"><i class="fa-solid fa-circle-question"></i> ヘルプ・使い方</a>
        </div>
    </nav>

    <header>
        <h1><i class="fa-solid fa-book-journal-whills"></i> 設定資料集ジェネレーター</h1>
        <div class="tools-hamburger" id="tools-hamburger"><i class="fa-solid fa-ellipsis-vertical"></i></div>
        <div class="header-btns" id="header-btns">
            <button id="pro-upgrade-btn" class="btn-pro" style="display: none;"><i class="fa-solid fa-crown"></i> Pro版へ</button>
            <button id="share-btn" class="btn-add"><i class="fa-solid fa-share-nodes"></i> 共有リンク</button>
            <button id="auth-btn" class="btn-login"><i class="fa-brands fa-google"></i> ログイン</button>
            <button id="save-json" class="btn-secondary"><i class="fa-solid fa-download"></i> 保存</button>
            <button id="load-btn-trigger" class="btn-secondary" title="保存したJSONを読み込みます"><i class="fa-solid fa-upload"></i> 読込</button>
            <input type="file" id="load-json" accept=".json" style="display: none;">
            <button id="export-pdf" class="btn-primary"><i class="fa-solid fa-file-pdf"></i> PDF出力</button>
        </div>
    </header>

    <div class="container">
        <div class="editor-area">
            <h2><i class="fa-solid fa-pen-nib"></i> 編集エリア</h2>
            
            <div class="form-group box">
                <label>プロジェクト名（タイトル）</label>
                <input type="text" id="project-title" placeholder="例：幻創紀行 -Aethelgard-">
                
                <label style="margin-top: 10px;">表紙画像</label>
                <label for="cover-image" class="custom-file-upload"><i class="fa-solid fa-image"></i> 画像を選択</label>
                <input type="file" id="cover-image" accept="image/*">
                <div id="cover-file-name" class="file-name-display"></div>
                <!-- ✨ 表紙画像の削除ボタン -->
                <button id="clear-cover-btn" class="btn-secondary" style="display:none; padding:3px 8px; font-size:0.8rem; margin-top:5px;"><i class="fa-solid fa-xmark"></i> 画像を削除</button>
            </div>

            <details class="color-palette-box box">
                <summary>
                    <span><i class="fa-solid fa-palette"></i> テーマカラーをカスタマイズ</span>
                    <i class="fa-solid fa-chevron-down arrow-icon"></i>
                </summary>
                <div class="palette-container">
                    <div class="color-item"><input type="color" id="color-accent" value="#2c3e50"><span>見出し</span></div>
                    <div class="color-item"><input type="color" id="color-primary" value="#e67e22"><span>アクセント</span></div>
                    <div class="color-item"><input type="color" id="color-text" value="#333333"><span>文字色</span></div>
                    <div class="color-item"><input type="color" id="color-bg" value="#ffffff"><span>背景色</span></div>
                </div>
                <div style="text-align: center; margin-top: 15px;">
                    <button id="apply-color-btn" class="btn-primary" style="padding: 5px 15px; font-size: 0.9rem;">
                        <i class="fa-solid fa-check"></i> 色を反映する
                    </button>
                </div>
            </details>

            <div class="box">
                <label><i class="fa-solid fa-list-ol"></i> PDF出力オプション <span class="pro-badge" style="background:#f1c40f; color:#fff; font-size:0.7rem; padding:2px 6px; border-radius:4px; margin-left:5px;">👑 Pro</span></label>
                <label style="font-size: 0.9rem;">
                    <input type="checkbox" id="toc-toggle" checked> 目次(INDEX)を自動生成する
                </label>
            </div>

            <!-- ✨ ここが抜けてたから崩れてた！直したよ！ -->
            <div class="box">
                <label><i class="fa-solid fa-wand-magic-sparkles"></i> デザインテンプレート <span class="pro-badge" style="background:#f1c40f; color:#fff; font-size:0.7rem; padding:2px 6px; border-radius:4px; margin-left:5px;">👑 Pro</span></label>
                <select id="template-select">
                    <option value="default">シンプル（標準）</option>
                    <option value="antique">アンティーク（古い羊皮紙風）</option>
                    <option value="dark-fantasy">ダークファンタジー</option>
                    <option value="cyberpunk">サイバーパンク</option>
                </select>
            </div>

            <div class="add-section-area box">
                <label>追加する項目を選んでください</label>
                <div class="select-add-group">
                    <select id="section-type-select">
                        <option value="world">世界概要</option>
                        <option value="geography">地理・国家</option>
                        <option value="organization">組織</option>
                        <option value="character">キャラ情報 (画像付)</option>
                        <option value="relationship">相関図・関係図 (画像付)</option>
                        <option value="term">用語集</option>
                        <option value="history">年表</option>
                        <option value="rule">ルール・禁則事項</option>
                        <option value="theme">作品テーマ</option>
                        <option value="custom">✨ カスタム項目</option>
                    </select>
                    <button id="add-sec-btn" class="btn-add"><i class="fa-solid fa-plus"></i> 追加</button>
                </div>
            </div>
            <div id="editor-sections"></div>
        </div>

        <div class="preview-area">
            <h2><i class="fa-solid fa-eye"></i> プレビュー</h2>
            <div id="pdf-content" class="document">
                <div id="preview-cover" class="cover-page">
                    <img id="preview-cover-img" src="" style="display:none;">
                    <h1 id="preview-title">プロジェクト名</h1>
                </div>
                <div id="preview-sections"></div>
            </div>
        </div>
    </div>

    <!-- モーダル・トースト -->
    <div id="help-modal" class="modal"><div class="modal-content"><span class="close-btn" id="close-modal">&times;</span><h2>使い方</h2></div></div>
    <div id="toast" class="toast"></div>
    <div id="pro-modal" class="modal">
        <div class="modal-content" style="max-width: 450px; text-align: center;">
            <span class="close-btn" id="close-pro-modal">&times;</span>
            <h2 style="color: #f1c40f; margin-bottom: 10px;"><i class="fa-solid fa-crown"></i> Pro版の有効化</h2>
            <p style="font-size: 0.9rem; text-align: left; line-height: 1.6;">
                BOOTHでご購入後にダウンロードできるファイルに記載されている<br>
                <strong>【注文番号-合言葉】</strong> を入力してください。
            </p>
            <input type="text" id="license-key-input" placeholder="例: 12345678-XXXXX" style="width: 100%; padding: 10px; margin: 15px 0; font-size: 1rem; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box;">
            <button id="submit-license-btn" class="btn-pro" style="width: 100%; padding: 12px; font-size: 1.1rem; justify-content: center;"><i class="fa-solid fa-key"></i> 認証してPro版にする</button>
            
            <div style="margin-top: 25px; font-size: 0.85rem; border-top: 1px dashed #ccc; padding-top: 15px; text-align: left;">
                <span style="color: #666;">まだライセンスをお持ちでない場合</span><br>
                <a href="https://torisproject.booth.pm/items/8429352" target="_blank" style="display: inline-block; margin-top: 10px; background: #fc4d50; color: white; padding: 8px 15px; border-radius: 4px; text-decoration: none; font-weight: bold;">
                    <i class="fa-solid fa-cart-shopping"></i> BOOTHストアで購入する
                </a>
            </div>
        </div>
    </div>
